<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D1B69"/>
      <stop offset="50%" style="stop-color:#1A0A3E"/>
      <stop offset="100%" style="stop-color:#0D0520"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="40%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="20" y="20" width="472" height="472" rx="92" ry="92" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.3"/>

  <!-- Connection lines (nexus links) -->
  <g filter="url(#lineGlow)" opacity="0.6">
    <!-- Center to outer nodes -->
    <line x1="256" y1="256" x2="156" y2="148" stroke="#A78BFA" stroke-width="2.5"/>
    <line x1="256" y1="256" x2="370" y2="148" stroke="#A78BFA" stroke-width="2.5"/>
    <line x1="256" y1="256" x2="140" y2="310" stroke="#A78BFA" stroke-width="2.5"/>
    <line x1="256" y1="256" x2="372" y2="310" stroke="#A78BFA" stroke-width="2.5"/>
    <line x1="256" y1="256" x2="200" y2="400" stroke="#A78BFA" stroke-width="2.5"/>
    <line x1="256" y1="256" x2="312" y2="400" stroke="#A78BFA" stroke-width="2.5"/>
    <!-- Inter-node connections -->
    <line x1="156" y1="148" x2="370" y2="148" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
    <line x1="140" y1="310" x2="200" y2="400" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
    <line x1="372" y1="310" x2="312" y2="400" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
    <line x1="156" y1="148" x2="140" y2="310" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
    <line x1="370" y1="148" x2="372" y2="310" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Central obsidian crystal / diamond shape -->
  <g transform="translate(256,248)">
    <polygon points="0,-72 52,-20 32,60 -32,60 -52,-20" fill="url(#crystal)" opacity="0.9"/>
    <!-- Crystal facet lines -->
    <line x1="0" y1="-72" x2="32" y2="60" stroke="#DDD6FE" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="-72" x2="-32" y2="60" stroke="#DDD6FE" stroke-width="1" opacity="0.4"/>
    <line x1="-52" y1="-20" x2="32" y2="60" stroke="#DDD6FE" stroke-width="1" opacity="0.3"/>
    <line x1="52" y1="-20" x2="-32" y2="60" stroke="#DDD6FE" stroke-width="1" opacity="0.3"/>
    <!-- Crystal highlight -->
    <polygon points="0,-72 52,-20 0,-10 -52,-20" fill="#DDD6FE" opacity="0.25"/>
  </g>

  <!-- Outer nexus nodes -->
  <g filter="url(#nodeGlow)">
    <circle cx="156" cy="148" r="14" fill="url(#glow)"/>
    <circle cx="370" cy="148" r="14" fill="url(#glow)"/>
    <circle cx="140" cy="310" r="12" fill="url(#glow)"/>
    <circle cx="372" cy="310" r="12" fill="url(#glow)"/>
    <circle cx="200" cy="400" r="10" fill="url(#glow)"/>
    <circle cx="312" cy="400" r="10" fill="url(#glow)"/>
  </g>

  <!-- Small sparkle dots -->
  <circle cx="108" cy="200" r="3" fill="#C4B5FD" opacity="0.5"/>
  <circle cx="400" cy="230" r="2.5" fill="#C4B5FD" opacity="0.4"/>
  <circle cx="256" cy="110" r="2" fill="#DDD6FE" opacity="0.5"/>
  <circle cx="340" cy="420" r="2" fill="#C4B5FD" opacity="0.3"/>
</svg>
