name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  desktop:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && pnpm install
        working-directory: apps/desktop

      # Build sidecars for both architectures
      - name: Build sidecars (aarch64)
        run: |
          cargo build --release --target aarch64-apple-darwin -p nexus-cli -p nexus-mcp-server
          cp target/aarch64-apple-darwin/release/nexus apps/desktop/src-tauri/binaries/nexus-aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/nexus-mcp-server apps/desktop/src-tauri/binaries/nexus-mcp-server-aarch64-apple-darwin

      - name: Build sidecars (x86_64)
        run: |
          cargo build --release --target x86_64-apple-darwin -p nexus-cli -p nexus-mcp-server
          cp target/x86_64-apple-darwin/release/nexus apps/desktop/src-tauri/binaries/nexus-x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/nexus-mcp-server apps/desktop/src-tauri/binaries/nexus-mcp-server-x86_64-apple-darwin

      # Build Tauri app directly (not via tauri-action)
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri universal binary
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target universal-apple-darwin

      # Generate latest.json for updater
      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="target/universal-apple-darwin/release/bundle"
          SIG=$(cat "${BUNDLE_DIR}/macos/Obsidian Nexus.app.tar.gz.sig")
          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "See the assets to download this version.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/gorillaKim/obsidian-nexus/releases/download/${GITHUB_REF_NAME}/Obsidian.Nexus.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${SIG}",
                "url": "https://github.com/gorillaKim/obsidian-nexus/releases/download/${GITHUB_REF_NAME}/Obsidian.Nexus.app.tar.gz"
              }
            }
          }
          ENDJSON

      # Upload all desktop artifacts
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            target/universal-apple-darwin/release/bundle/macos/Obsidian Nexus.app.tar.gz
            target/universal-apple-darwin/release/bundle/macos/Obsidian Nexus.app.tar.gz.sig
            latest.json

  cli:
    needs: desktop
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: aarch64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - run: cargo build --release -p nexus-cli -p nexus-mcp-server
      - run: tar czf nexus-cli-darwin-${{ matrix.arch }}.tar.gz -C target/release nexus nexus-mcp-server
      - run: shasum -a 256 nexus-cli-darwin-${{ matrix.arch }}.tar.gz > nexus-cli-darwin-${{ matrix.arch }}.tar.gz.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            nexus-cli-darwin-${{ matrix.arch }}.tar.gz
            nexus-cli-darwin-${{ matrix.arch }}.tar.gz.sha256
