name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  desktop:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('apps/desktop/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: corepack enable && pnpm install --no-frozen-lockfile
        working-directory: apps/desktop

      - name: Install sidecar dependencies
        run: npm install --omit=dev
        working-directory: apps/desktop/sidecar

      - name: Cache Tauri CLI
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: ${{ runner.os }}-tauri-cli-2

      - name: Install Tauri CLI
        run: which cargo-tauri || cargo install tauri-cli --version "^2"

      - name: Build sidecars (aarch64 + x86_64)
        run: |
          cargo build --release \
            --target aarch64-apple-darwin \
            --target x86_64-apple-darwin \
            -p nexus-cli -p nexus-mcp-server
          cp target/aarch64-apple-darwin/release/obs-nexus         apps/desktop/src-tauri/binaries/obs-nexus-aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/nexus-mcp-server apps/desktop/src-tauri/binaries/nexus-mcp-server-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/obs-nexus          apps/desktop/src-tauri/binaries/obs-nexus-x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/nexus-mcp-server  apps/desktop/src-tauri/binaries/nexus-mcp-server-x86_64-apple-darwin

      - name: Create universal sidecars
        run: |
          lipo -create \
            apps/desktop/src-tauri/binaries/obs-nexus-aarch64-apple-darwin \
            apps/desktop/src-tauri/binaries/obs-nexus-x86_64-apple-darwin \
            -output apps/desktop/src-tauri/binaries/obs-nexus-universal-apple-darwin
          lipo -create \
            apps/desktop/src-tauri/binaries/nexus-mcp-server-aarch64-apple-darwin \
            apps/desktop/src-tauri/binaries/nexus-mcp-server-x86_64-apple-darwin \
            -output apps/desktop/src-tauri/binaries/nexus-mcp-server-universal-apple-darwin

      - name: Build Tauri universal binary
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target universal-apple-darwin

      - name: Prepare artifacts and generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG=$(find . -name "*.dmg" -path "*/bundle/*" | head -1)
          TARGZ=$(find . -name "*.app.tar.gz" -path "*/bundle/*" | head -1)
          SIG=$(find . -name "*.app.tar.gz.sig" -path "*/bundle/*" | head -1)

          [ -n "$DMG" ]    && cp "$DMG"    ./Obsidian-Nexus.dmg
          [ -n "$TARGZ" ]  && cp "$TARGZ"  ./Obsidian.Nexus.app.tar.gz
          [ -n "$SIG" ]    && cp "$SIG"    ./Obsidian.Nexus.app.tar.gz.sig

          SIG_CONTENT=""
          [ -f "./Obsidian.Nexus.app.tar.gz.sig" ] && SIG_CONTENT=$(cat "./Obsidian.Nexus.app.tar.gz.sig")

          cat > latest.json <<ENDJSON
          {
            "version": "${VERSION}",
            "notes": "See the assets to download this version.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_CONTENT}",
                "url": "https://github.com/gorillaKim/obsidian-nexus/releases/download/${GITHUB_REF_NAME}/Obsidian.Nexus.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "https://github.com/gorillaKim/obsidian-nexus/releases/download/${GITHUB_REF_NAME}/Obsidian.Nexus.app.tar.gz"
              }
            }
          }
          ENDJSON

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Obsidian-Nexus.dmg
            Obsidian.Nexus.app.tar.gz
            Obsidian.Nexus.app.tar.gz.sig
            latest.json

  cli:
    # desktop과 병렬 실행 — 의존성 없음
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli

      - name: Build aarch64 + x86_64
        run: |
          cargo build --release \
            --target aarch64-apple-darwin \
            --target x86_64-apple-darwin \
            -p nexus-cli -p nexus-mcp-server

          tar czf nexus-cli-darwin-aarch64.tar.gz -C target/aarch64-apple-darwin/release obs-nexus nexus-mcp-server
          shasum -a 256 nexus-cli-darwin-aarch64.tar.gz > nexus-cli-darwin-aarch64.tar.gz.sha256

          tar czf nexus-cli-darwin-x86_64.tar.gz -C target/x86_64-apple-darwin/release obs-nexus nexus-mcp-server
          shasum -a 256 nexus-cli-darwin-x86_64.tar.gz > nexus-cli-darwin-x86_64.tar.gz.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            nexus-cli-darwin-aarch64.tar.gz
            nexus-cli-darwin-aarch64.tar.gz.sha256
            nexus-cli-darwin-x86_64.tar.gz
            nexus-cli-darwin-x86_64.tar.gz.sha256

  homebrew:
    needs: [desktop, cli]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Update Homebrew tap
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          chmod +x scripts/update-homebrew-tap.sh
          ./scripts/update-homebrew-tap.sh "${{ github.ref_name }}"
