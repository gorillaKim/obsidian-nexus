name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  desktop:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable && pnpm install
        working-directory: apps/desktop

      # Build sidecars for both architectures
      - name: Build sidecars (aarch64)
        run: |
          cargo build --release --target aarch64-apple-darwin -p nexus-cli -p nexus-mcp-server
          cp target/aarch64-apple-darwin/release/nexus apps/desktop/src-tauri/binaries/nexus-aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/nexus-mcp-server apps/desktop/src-tauri/binaries/nexus-mcp-server-aarch64-apple-darwin

      - name: Build sidecars (x86_64)
        run: |
          cargo build --release --target x86_64-apple-darwin -p nexus-cli -p nexus-mcp-server
          cp target/x86_64-apple-darwin/release/nexus apps/desktop/src-tauri/binaries/nexus-x86_64-apple-darwin
          cp target/x86_64-apple-darwin/release/nexus-mcp-server apps/desktop/src-tauri/binaries/nexus-mcp-server-x86_64-apple-darwin

      - name: Create universal sidecars
        run: |
          lipo -create \
            apps/desktop/src-tauri/binaries/nexus-aarch64-apple-darwin \
            apps/desktop/src-tauri/binaries/nexus-x86_64-apple-darwin \
            -output apps/desktop/src-tauri/binaries/nexus-universal-apple-darwin
          lipo -create \
            apps/desktop/src-tauri/binaries/nexus-mcp-server-aarch64-apple-darwin \
            apps/desktop/src-tauri/binaries/nexus-mcp-server-x86_64-apple-darwin \
            -output apps/desktop/src-tauri/binaries/nexus-mcp-server-universal-apple-darwin

      # Build Tauri app directly (not via tauri-action)
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri universal binary
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target universal-apple-darwin --bundles app,dmg --config apps/desktop/src-tauri/tauri.conf.json

      # Debug: list bundle output
      - name: List bundle output
        if: always()
        run: |
          echo "=== Searching for bundle files ==="
          find . -path "*/release/bundle" -type d 2>/dev/null
          find . -name "*.dmg" -o -name "*.tar.gz.sig" -o -name "*.app.tar.gz" 2>/dev/null | head -20

      - name: Generate latest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="target/universal-apple-darwin/release/bundle"

          # Check if signature exists (requires TAURI_SIGNING_PRIVATE_KEY secret)
          SIG_FILE="${BUNDLE_DIR}/macos/Obsidian Nexus.app.tar.gz.sig"
          if [ -f "${SIG_FILE}" ]; then
            SIG=$(cat "${SIG_FILE}")
          else
            echo "WARNING: No signature file found. Ensure TAURI_SIGNING_PRIVATE_KEY secret is set."
            echo "Available files:"
            ls -la "${BUNDLE_DIR}/macos/" || true
            SIG=""
          fi

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See the assets to download this version.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "https://github.com/gorillaKim/obsidian-nexus/releases/download/${GITHUB_REF_NAME}/Obsidian.Nexus.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${SIG}",
                "url": "https://github.com/gorillaKim/obsidian-nexus/releases/download/${GITHUB_REF_NAME}/Obsidian.Nexus.app.tar.gz"
              }
            }
          }
          EOF

      # Rename artifacts to remove spaces, then upload
      - name: Prepare artifacts
        run: |
          BUNDLE="target/universal-apple-darwin/release/bundle"
          cp "${BUNDLE}/dmg/"*.dmg ./Obsidian-Nexus.dmg || true
          cp "${BUNDLE}/macos/Obsidian Nexus.app.tar.gz" ./Obsidian.Nexus.app.tar.gz || true
          cp "${BUNDLE}/macos/Obsidian Nexus.app.tar.gz.sig" ./Obsidian.Nexus.app.tar.gz.sig || true
          ls -la Obsidian* latest.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Obsidian-Nexus.dmg
            Obsidian.Nexus.app.tar.gz
            Obsidian.Nexus.app.tar.gz.sig
            latest.json

  cli:
    needs: desktop
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # Build for both architectures
      - name: Build aarch64
        run: |
          cargo build --release --target aarch64-apple-darwin -p nexus-cli -p nexus-mcp-server
          tar czf nexus-cli-darwin-aarch64.tar.gz -C target/aarch64-apple-darwin/release nexus nexus-mcp-server
          shasum -a 256 nexus-cli-darwin-aarch64.tar.gz > nexus-cli-darwin-aarch64.tar.gz.sha256

      - name: Build x86_64
        run: |
          cargo build --release --target x86_64-apple-darwin -p nexus-cli -p nexus-mcp-server
          tar czf nexus-cli-darwin-x86_64.tar.gz -C target/x86_64-apple-darwin/release nexus nexus-mcp-server
          shasum -a 256 nexus-cli-darwin-x86_64.tar.gz > nexus-cli-darwin-x86_64.tar.gz.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            nexus-cli-darwin-aarch64.tar.gz
            nexus-cli-darwin-aarch64.tar.gz.sha256
            nexus-cli-darwin-x86_64.tar.gz
            nexus-cli-darwin-x86_64.tar.gz.sha256
